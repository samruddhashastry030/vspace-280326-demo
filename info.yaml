# Tiny Tapeout project information
project:
  title:        "V-SPACE Demo Hardware Stopwatch"
  author:       "Advaittej"
  discord:      "" 
  description:  "1-second interval stopwatch with start/pause toggled via input switch."
  language:     "Verilog" 
  clock_hz:     10000000 

  # How many tiles your design occupies?
  tiles: "1x1" 

  # Your top module name must start with "tt_um_". 
  top_module:  "tt_um_advaittej_stopwatch"

  # List your project's source files here.
  source_files:
    - "project.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
pinout:
  # Inputs
  ui[0]: "Start / Pause Button"
  ui[1]: ""
  ui[2]: ""
  ui[3]: ""
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  # Outputs
  uo[0]: "Segment A"
  uo[1]: "Segment B"
  uo[2]: "Segment C"
  uo[3]: "Segment D"
  uo[4]: "Segment E"
  uo[5]: "Segment F"
  uo[6]: "Segment G"
  uo[7]: "Unused (Tied Low)"

  # Bidirectional pins
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
