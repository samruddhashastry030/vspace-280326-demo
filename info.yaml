# Tiny Tapeout project information
project:
  title:        "CryptoMuse - PRESENT-80 Music Generator"
  author:       "Samruddha Shastry, Varun Shankar, Prasoon Mishra"
  discord:      ""
  description:  "PRESENT-80 lightweight block cipher drives a pentatonic music engine. 80-bit key and 64-bit plaintext are loaded serially; after encryption the ciphertext seeds a PWM tone generator with pause/resume control."
  language:     "Verilog"
  clock_hz:     50000000
  # How many tiles your design occupies?
  tiles: "1x1"
  # Your top module name must start with "tt_um_".
  top_module:  "tt_um_cryptomuse"
  # List your project's source files here.
  source_files:
    - "project.v"
# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
pinout:
  # Inputs
  ui[0]: "Play / Pause (1=play, 0=pause)"
  ui[1]: ""
  ui[2]: ""
  ui[3]: ""
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""
  # Outputs
  uo[0]: "PWM audio output"
  uo[1]: ""
  uo[2]: ""
  uo[3]: ""
  uo[4]: ""
  uo[5]: ""
  uo[6]: ""
  uo[7]: ""
  # Bidirectional pins
  uio[0]: "key_load (shift in 80-bit key byte by byte)"
  uio[1]: "pt_load (shift in 64-bit plaintext byte by byte)"
  uio[2]: "start encrypt pulse"
  uio[3]: ""
  uio[4]: "byte_sel[0] - ciphertext byte select"
  uio[5]: "byte_sel[1]"
  uio[6]: "byte_sel[2]"
  uio[7]: ""
# Do not change!
yaml_version: 6
